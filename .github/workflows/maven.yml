name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and verify Java 25 / Paper 26.1.2 compatibility
        run: ./scripts/verify-compatibility.sh --file pom.xml

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: HoverWorth-Paper-26.1.2-Java25
          path: target/*.jar
